version: '3'

tasks:
  start:
    desc: Start development server
    cmds:
      - npm run dev -- --host
  
  install:
    desc: Install dependencies
    cmds:
      - npm install
  
  build:
    desc: Build the project
    cmds:
      - npm run build
  
  lint:
    desc: Run linter
    cmds:
      - npm run lint